<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 400px; font-family: -apple-system, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 12px; }
    h1 { font-size: 14px; margin-bottom: 8px; color: #8b8bff; }
    .meta { font-size: 11px; color: #888; margin-bottom: 8px; word-break: break-all; }
    textarea { width: 100%; height: 150px; background: #16213e; color: #e0e0e0; border: 1px solid #333; border-radius: 6px; padding: 8px; font-size: 12px; resize: vertical; }
    .related { margin-top: 8px; font-size: 11px; max-height: 80px; overflow-y: auto; }
    .related-item { padding: 3px 0; border-bottom: 1px solid #222; }
    .related-label { color: #8b8bff; font-size: 11px; margin-bottom: 4px; }
    button { width: 100%; padding: 8px; margin-top: 8px; background: #4a47a3; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
    button:hover { background: #5a57b3; }
    button:disabled { opacity: 0.5; cursor: default; }
    .status { margin-top: 6px; font-size: 11px; text-align: center; }
    .status.ok { color: #4ade80; }
    .status.err { color: #f87171; }
    .settings { text-align: right; margin-bottom: 6px; }
    .settings a { color: #666; font-size: 11px; cursor: pointer; text-decoration: underline; }
    .settings-panel { display: none; margin-bottom: 8px; }
    .settings-panel.open { display: block; }
    .settings-panel input { width: 100%; background: #16213e; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; padding: 5px; font-size: 11px; margin-bottom: 4px; }
    .settings-panel label { font-size: 10px; color: #888; }
  </style>
</head>
<body>
  <div class="settings">
    <a id="toggleSettings">Settings</a>
  </div>
  <div id="settingsPanel" class="settings-panel">
    <label>Brain URL</label>
    <input id="brainUrl" placeholder="https://brain.beliczki.hu">
    <label>Capture Secret</label>
    <input id="secret" type="password" placeholder="Bearer token">
    <button id="saveSettings" style="background:#333;margin-bottom:8px">Save Settings</button>
  </div>

  <h1 id="pageTitle">Loading...</h1>
  <div class="meta" id="pageUrl"></div>
  <textarea id="content" placeholder="Extracting page content..."></textarea>

  <div class="related" id="related">
    <div class="related-label">Related in brain:</div>
    <div id="relatedItems">searching...</div>
  </div>

  <button id="saveBtn" disabled>Save to Brain</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
